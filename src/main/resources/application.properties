# Configuration de la base de donnÈes
spring.datasource.url=jdbc:mysql://localhost:3306/warehouse_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuration JWT
jwt.secret=MY_SECRET_KEY_12345678901234567890123456789012
jwt.expiration=86400000

# Configuration du serveur
server.port=8080

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.pfe=DEBUG

# Chemin vers les donnÈes Tesseract (adaptez selon votre OS)
# Pour Windows : utiliser des doubles backslashes ou des slashes
tesseract.datapath=C:\\Program Files\\Tesseract-OCR\\tessdata

# ? AJOUT : Taille maximale des fichiers uploadÈs (pour OCR)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB