# Configuration de la base de donnķes
spring.datasource.url=jdbc:mysql://localhost:3306/warehouse_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuration JWT
jwt.secret=MY_SECRET_KEY_12345678901234567890123456789012
jwt.expiration=86400000

# Configuration du serveur
server.port=8080

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.pfe=DEBUG

# Chemin vers les donnķes Tesseract (adaptez selon votre OS)
# Pour Windows : utiliser des doubles backslashes ou des slashes
tesseract.datapath=C:\\Program Files\\Tesseract-OCR\\tessdata

# ? AJOUT : Taille maximale des fichiers uploadķs (pour OCR)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Geocoding with Nominatim (OpenStreetMap)
geocoding.nominatim.url=https://nominatim.openstreetmap.org/search
geocoding.user-agent=WarehouseApp/1.0

# Configuration du serveur SMTP (exemple avec Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=abdoublw5@gmail.com
spring.mail.password=geak wogp isdv wtcc
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Adresse email expķditeur (optionnel)
spring.mail.from=noreply@warehouse.com

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ========== NOUVEAU : CONFIGURATION CACHE INTELLIGENT (PR╔VISIONS 7 JOURS) ==========
# Intervalle de collecte des mķtriques (cron: toutes les heures)
prevision.collecte.cron=0 0 * * * *
# Intervalle de recalcul des prķvisions (cron: toutes les 6 heures)
prevision.recalcul.cron=0 0 */6 * * *
# Seuil de dķtection des pics (en pourcentage au-dessus de la moyenne)
prevision.seuil.pic=50
# Nombre de jours d'historique pour le modĶle (minimum 30 jours)
prevision.historique.jours=90
# Nombre de jours de prķvision (7 jours)
prevision.horizon.jours=7